name: Deploy My Static Site to Walrus with Provenance

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Upload Move Bytecode
        uses: zktx-io/sui-mvr-provenance/.github/workflows/deploy_with_slsa3.yml@v0.0.3
        with:
          working-directory: ./hello_world